name: Generate YouTube Feed

on:
  schedule:
    # YouTube feed: daily at 00:00 UTC = 08:00 Beijing
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: cd scripts && npm install

      - name: Generate YouTube feed
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
        run: cd scripts && node generate-feed.js --youtube-only

      - name: Commit and push feed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add feed-youtube.json state-feed.json
          git diff --cached --quiet || git commit -m "chore: update youtube feed [skip ci]"
          git push
